<p>Displaying Data From API call - get api</p>

<table  *ngIf="productsData && productsData.length > 0" border="1" >
    <tr>
        <th>Product</th>
        <th>Cost</th>
        <th>Rating</th>
        <th>ProductImage</th>
    </tr>
    @for(product of productsData;track product.id){
        <tr>
            <td>{{product.title}}</td>
            <td>{{product.price | currency:'INR'}}</td>
            <td>{{product.rating}}</td>
            <td><img [src]="product.thumbnail" height="100px" width="100px"></td>
        </tr>
    }
</table>
